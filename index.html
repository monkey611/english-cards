<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>幼儿趣味英语 · 卡片阅读本</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #f0f4ff;
    color: #333;
    overflow: hidden;
    height: 100vh;
    height: 100dvh;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ==================== 目录页 ==================== */
  .catalog {
    position: fixed; inset: 0;
    background: linear-gradient(160deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    overflow-y: auto;
    z-index: 100;
    padding: 10px 10px 60px;
    transition: transform 0.35s ease;
  }
  .catalog.hidden { transform: translateX(-110%); }

  .catalog-header {
    text-align: center;
    padding: 24px 0 8px;
    position: sticky; top: 0;
    z-index: 10;
    background: linear-gradient(180deg, rgba(102,126,234,0.95) 60%, transparent 100%);
    padding-bottom: 20px;
  }
  .catalog-title {
    font-size: 30px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 3px 12px rgba(0,0,0,0.15);
    letter-spacing: 2px;
  }
  .catalog-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.8);
    margin-top: 4px;
  }
  .catalog-stats {
    display: flex; justify-content: center; gap: 16px;
    margin-top: 10px; font-size: 12px; color: rgba(255,255,255,0.7);
  }
  .catalog-stats span { background: rgba(255,255,255,0.15); padding: 2px 12px; border-radius: 20px; }

  /* 分类组 */
  .catalog-group {
    margin-bottom: 10px;
  }
  .catalog-group-title {
    font-size: 14px;
    font-weight: 800;
    padding: 6px 14px;
    margin: 0 8px 8px;
    color: #fff;
    background: rgba(255,255,255,0.12);
    border-radius: 20px;
    display: inline-block;
    letter-spacing: 1px;
  }

  .catalog-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    max-width: 420px;
    margin: 0 auto;
    padding: 0 6px;
  }

  .catalog-item {
    background: rgba(255,255,255,0.92);
    border-radius: 16px;
    padding: 12px 6px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .catalog-item:active { transform: scale(0.93); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
  .catalog-item .icon { font-size: 32px; display: block; margin-bottom: 3px; }
  .catalog-item .name { font-size: 12px; font-weight: 800; color: #444; }
  .catalog-item .count { font-size: 10px; color: #999; }

  /* ==================== 阅读器 ==================== */
  .reader {
    position: fixed; inset: 0;
    display: flex;
    flex-direction: column;
    transform: translateX(110%);
    transition: transform 0.35s ease;
    z-index: 200;
  }
  .reader.active { transform: translateX(0); }

  /* 阅读器背景遮罩 */
  .reader-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.5);
    transition: opacity 0.35s;
  }

  /* 顶部栏 */
  .reader-top {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    flex-shrink: 0;
    z-index: 10;
    gap: 10px;
  }
  .btn-back {
    background: rgba(255,255,255,0.9);
    border: none;
    color: #555;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 16px;
    border-radius: 22px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .reader-title {
    flex: 1;
    font-size: 17px;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .page-indicator {
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.15);
    padding: 4px 12px;
    border-radius: 14px;
  }

  /* 卡片区域 */
  .card-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 16px;
    position: relative;
    overflow: hidden;
  }

  /* 滑动提示 */
  .swipe-hint {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: rgba(255,255,255,0.5); z-index: 5;
    pointer-events: none; transition: opacity 0.5s;
  }
  .swipe-hint.hide { opacity: 0; }

  .card {
    width: 90%;
    max-width: 340px;
    min-height: 65%;
    border-radius: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 18px 22px;
    position: absolute;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15), 0 2px 8px rgba(0,0,0,0.08);
  }
  .card::after {
    content: ''; position: absolute; inset: 6px; border-radius: 24px;
    border: 2px dashed rgba(255,255,255,0.4); pointer-events: none;
  }
  .card.current { transform: translateX(0) scale(1); opacity: 1; z-index: 2; }
  .card.prev { transform: translateX(-110%) scale(0.92); opacity: 0; z-index: 1; pointer-events: none; }
  .card.next { transform: translateX(110%) scale(0.92); opacity: 0; z-index: 1; pointer-events: none; }

  .card .emoji {
    font-size: clamp(90px, 28vw, 130px);
    line-height: 1.1;
    margin-bottom: 8px;
    filter: drop-shadow(0 6px 12px rgba(0,0,0,0.08));
    transition: transform 0.3s;
  }
  .card .word {
    font-size: clamp(30px, 8vw, 44px);
    font-weight: 900;
    color: #333;
    text-align: center;
    margin-bottom: 4px;
    letter-spacing: 1px;
  }
  .card .phonetic {
    font-size: clamp(14px, 3.5vw, 17px);
    color: #999;
    font-style: italic;
    margin-bottom: 6px;
  }
  .card .cn {
    font-size: clamp(20px, 6vw, 28px);
    font-weight: 800;
    text-align: center;
  }

  /* 喇叭按钮 */
  .btn-speak {
    margin-top: 10px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.06);
    font-size: 28px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .btn-speak:active { transform: scale(0.82); background: rgba(0,0,0,0.12); }
  .btn-speak.speaking { animation: pulse 0.5s infinite; background: rgba(255,100,100,0.12); }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }

  /* 底部导航 */
  .reader-bottom {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 16px 22px;
    flex-shrink: 0;
    gap: 20px;
  }
  .btn-nav {
    background: rgba(255,255,255,0.9);
    border: none;
    color: #555;
    font-size: 22px;
    width: 54px;
    height: 54px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 3px 12px rgba(0,0,0,0.1);
    font-weight: 700;
  }
  .btn-nav:active { transform: scale(0.9); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .btn-nav:disabled { opacity: 0.25; transform: none; box-shadow: none; }

  /* 进度圆点 */
  .progress-bar {
    flex: 1;
    display: flex;
    justify-content: center;
    gap: 6px;
    max-width: 200px;
  }
  .progress-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transition: background 0.3s, transform 0.3s;
  }
  .progress-dot.active { background: #fff; transform: scale(1.4); }

  /* 系列切换按钮 */
  .btn-series {
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 7px 14px;
    border-radius: 16px;
    cursor: pointer;
    white-space: nowrap;
    position: absolute;
    bottom: 80px;
    z-index: 5;
  }
  .btn-series:active { background: rgba(255,255,255,0.3); }
  .btn-series-prev { left: 12px; }
  .btn-series-next { right: 12px; }

  /* ==================== 动画 ==================== */
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes bounceIn {
    0% { transform: scale(0.3); opacity: 0; }
    50% { transform: scale(1.05); }
    70% { transform: scale(0.95); }
    100% { transform: scale(1); opacity: 1; }
  }
  .card.current { animation: popIn 0.3s ease; }
  .card.current .emoji { animation: bounceIn 0.5s ease; }
</style>

// ============================================================
// 状态
// ============================================================
let currentSeries = 0;
let currentCard = 0;
let touchStartX = 0;
let touchStartY = 0;

const catalog = document.getElementById('catalog');
const reader = document.getElementById('reader');
const catalogGrid = document.getElementById('catalogGrid');
const readerTitle = document.getElementById('readerTitle');
const pageIndicator = document.getElementById('pageIndicator');
const progressBar = document.getElementById('progressBar');
const swipeHint = document.getElementById('swipeHint');
const cardArea = document.getElementById('cardArea');
const cardPrev = document.getElementById('cardPrev');
const cardCurrent = document.getElementById('cardCurrent');
const cardNext = document.getElementById('cardNext');
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');
const btnBack = document.getElementById('btnBack');
const btnPrevSeries = document.getElementById('btnPrevSeries');
const btnNextSeries = document.getElementById('btnNextSeries');

// ============================================================
// 目录
// ============================================================
function renderCatalog() {
  const groupOrder = ['基础认知', '动物世界', '美味食物', '生活百科', '自然科学', '运动交通', '情感认知', '口语对话'];
  const groupNames = {
    '基础认知': '🔤 基础认知', '动物世界': '🐾 动物世界', '美味食物': '🍎 美味食物',
    '生活百科': '🏠 生活百科', '自然科学': '🌿 自然科学', '运动交通': '🏃 运动交通',
    '情感认知': '😊 情感认知', '口语对话': '💬 口语对话'
  };

  const grouped = {};
  series.forEach((s, idx) => {
    const g = s.group || '基础认知';
    if (!grouped[g]) grouped[g] = [];
    grouped[g].push({ ...s, idx });
  });

  let html = '';
  groupOrder.forEach(g => {
    if (!grouped[g] || !grouped[g].length) return;
    const items = grouped[g].map(s => `
      <div class="catalog-item" onclick="openSeries(${s.idx})">
        <span class="icon">${s.icon}</span>
        <div class="name">${s.name}</div>
        <div class="count">${s.cards.length}个</div>
      </div>`).join('');
    html += `<div class="catalog-group">
      <div class="catalog-group-title">${groupNames[g]}</div>
      <div class="catalog-grid">${items}</div>
    </div>`;
  });
  catalogGrid.innerHTML = html;
}

// ============================================================
// 阅读器
// ============================================================
function openSeries(idx) {
  currentSeries = idx;
  currentCard = 0;
  catalog.classList.add('hidden');
  reader.classList.add('active');
  renderCard();
}

function goBack() {
  reader.classList.remove('active');
  catalog.classList.remove('hidden');
}

function renderCard() {
  const s = series[currentSeries];
  const cards = s.cards;
  const total = cards.length;

  readerTitle.textContent = `${s.icon} ${s.name}`;

  // 背景色跟随主题
  reader.style.background = s.bg;
  cardArea.style.background = s.bg;
  pageIndicator.textContent = `${currentCard + 1}/${total}`;

  // 进度圆点
  const dotsPerPage = Math.min(total, 20);
  const step = Math.max(1, Math.floor(total / dotsPerPage));
  let dotsHTML = '';
  for (let i = 0; i < total; i += step) {
    const active = (currentCard >= i && currentCard < i + step) ? ' active' : '';
    dotsHTML += `<div class="progress-dot${active}"></div>`;
  }
  progressBar.innerHTML = dotsHTML;

  // 滑动提示3秒后消失
  swipeHint.classList.add('hide');

  // 渲染三张卡（前、当前、后）
  const renderOne = (el, idx, cls) => {
    if (idx < 0 || idx >= total) {
      el.style.display = 'none';
      return;
    }
    el.style.display = 'flex';
    const c = cards[idx];
    el.className = `card ${cls}`;
    el.style.background = s.bg;
    el.innerHTML = `
      <div class="emoji">${c.emoji}</div>
      <div class="word">${c.word}</div>
      <div class="phonetic">${c.phonetic}</div>
      <div class="cn" style="color:${s.accent}">${c.cn}</div>
      <button class="btn-speak" onclick="event.stopPropagation(); speak('${c.word.replace(/'/g, "\\'")}', this)">🔊</button>
    `;
  };

  renderOne(cardPrev, currentCard - 1, 'prev');
  renderOne(cardCurrent, currentCard, 'current');
  renderOne(cardNext, currentCard + 1, 'next');

  btnPrev.disabled = currentCard === 0;
  btnNext.disabled = currentCard === total - 1;
}

// ============================================================
// 语音朗读
// ============================================================
function speak(text, btn) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';
  utter.rate = 0.85;
  utter.pitch = 1.1;

  btn.classList.add('speaking');
  utter.onend = () => btn.classList.remove('speaking');
  utter.onerror = () => btn.classList.remove('speaking');

  window.speechSynthesis.speak(utter);
}

function goPrev() {
  if (currentCard > 0) {
    currentCard--;
    renderCard();
  }
}

function goNext() {
  if (currentCard < series[currentSeries].cards.length - 1) {
    currentCard++;
    renderCard();
  }
}

function switchSeries(delta) {
  const next = currentSeries + delta;
  if (next >= 0 && next < series.length) {
    currentSeries = next;
    currentCard = 0;
    renderCard();
  }
}

// ============================================================
// 触摸滑动
// ============================================================
cardArea.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

cardArea.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    if (dx < 0) goNext();
    else goPrev();
  }
}, { passive: true });

// 键盘左右
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') goPrev();
  if (e.key === 'ArrowRight') goNext();
  if (e.key === 'Escape') goBack();
});

// 按钮
btnPrev.addEventListener('click', goPrev);
btnNext.addEventListener('click', goNext);
btnBack.addEventListener('click', goBack);
btnPrevSeries.addEventListener('click', () => switchSeries(-1));
btnNextSeries.addEventListener('click', () => switchSeries(1));

// ============================================================
// 初始化
// ============================================================
renderCatalog();
</script>
