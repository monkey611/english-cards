<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>幼儿趣味英语 · 卡片阅读本</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #1a1a2e;
    color: #fff;
    overflow: hidden;
    height: 100vh;
    height: 100dvh;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ==================== 目录页 ==================== */
  .catalog {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    overflow-y: auto;
    z-index: 100;
    padding: 20px 16px 40px;
    transition: transform 0.4s ease;
  }
  .catalog.hidden { transform: translateX(-100%); }

  .catalog-title {
    text-align: center;
    font-size: 28px;
    font-weight: 900;
    margin: 20px 0 6px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .catalog-sub {
    text-align: center;
    font-size: 14px;
    opacity: 0.8;
    margin-bottom: 24px;
  }

  .catalog-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    max-width: 400px;
    margin: 0 auto;
  }

  .catalog-item {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 16px 10px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .catalog-item:active { transform: scale(0.95); background: rgba(255,255,255,0.25); }
  .catalog-item .icon { font-size: 36px; display: block; margin-bottom: 6px; }
  .catalog-item .name { font-size: 15px; font-weight: 700; }
  .catalog-item .count { font-size: 11px; opacity: 0.7; margin-top: 2px; }

  /* ==================== 阅读器 ==================== */
  .reader {
    position: fixed; inset: 0;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.4s ease;
    z-index: 200;
  }
  .reader.active { transform: translateX(0); }

  /* 顶部栏 */
  .reader-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
    flex-shrink: 0;
    z-index: 10;
  }
  .btn-back {
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    font-size: 14px;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
  }
  .reader-title {
    font-size: 16px;
    font-weight: 700;
  }
  .page-indicator {
    font-size: 13px;
    opacity: 0.7;
  }

  /* 卡片区域 */
  .card-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .card {
    width: 100%;
    max-width: 360px;
    aspect-ratio: 3 / 4;
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    position: absolute;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .card.current { transform: translateX(0); opacity: 1; z-index: 2; }
  .card.prev { transform: translateX(-120%); opacity: 0; z-index: 1; }
  .card.next { transform: translateX(120%); opacity: 0; z-index: 1; }

  .card .emoji {
    font-size: clamp(80px, 25vw, 120px);
    line-height: 1.2;
    margin-bottom: 12px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
  }
  .card .word {
    font-size: clamp(28px, 8vw, 40px);
    font-weight: 900;
    color: #333;
    text-align: center;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }
  .card .phonetic {
    font-size: clamp(14px, 4vw, 18px);
    color: #888;
    font-style: italic;
    margin-bottom: 8px;
  }
  .card .cn {
    font-size: clamp(20px, 6vw, 28px);
    font-weight: 700;
    text-align: center;
  }

  /* 底部导航 */
  .reader-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px 24px;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
    flex-shrink: 0;
  }
  .btn-nav {
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    font-size: 20px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .btn-nav:active { background: rgba(255,255,255,0.3); }
  .btn-nav:disabled { opacity: 0.3; }

  .progress-bar {
    flex: 1;
    margin: 0 16px;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s;
  }

  /* 序列切换按钮 */
  .series-nav {
    display: flex;
    gap: 8px;
    margin: 0 8px;
  }
  .btn-series {
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 14px;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-series:active { background: rgba(255,255,255,0.3); }

  /* ==================== 动画 ==================== */
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }
  .card.current { animation: fadeIn 0.3s ease; }
</style>

<!-- ==================== 目录页 ==================== -->
<div class="catalog" id="catalog">

// ============================================================
// 状态
// ============================================================
let currentSeries = 0;
let currentCard = 0;
let touchStartX = 0;
let touchStartY = 0;

const catalog = document.getElementById('catalog');
const reader = document.getElementById('reader');
const catalogGrid = document.getElementById('catalogGrid');
const readerTitle = document.getElementById('readerTitle');
const pageIndicator = document.getElementById('pageIndicator');
const progressFill = document.getElementById('progressFill');
const cardArea = document.getElementById('cardArea');
const cardPrev = document.getElementById('cardPrev');
const cardCurrent = document.getElementById('cardCurrent');
const cardNext = document.getElementById('cardNext');
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');
const btnBack = document.getElementById('btnBack');
const btnPrevSeries = document.getElementById('btnPrevSeries');
const btnNextSeries = document.getElementById('btnNextSeries');

// ============================================================
// 目录
// ============================================================
function renderCatalog() {
  catalogGrid.innerHTML = series
    .map(
      (s, i) => `
    <div class="catalog-item" onclick="openSeries(${i})">
      <span class="icon">${s.icon}</span>
      <div class="name">${s.name}</div>
      <div class="count">${s.nameEn} · ${s.cards.length}词</div>
    </div>`
    )
    .join('');
}

// ============================================================
// 阅读器
// ============================================================
function openSeries(idx) {
  currentSeries = idx;
  currentCard = 0;
  catalog.classList.add('hidden');
  reader.classList.add('active');
  renderCard();
}

function goBack() {
  reader.classList.remove('active');
  catalog.classList.remove('hidden');
}

function renderCard() {
  const s = series[currentSeries];
  const cards = s.cards;
  const total = cards.length;

  readerTitle.textContent = `${s.icon} ${s.name}`;
  pageIndicator.textContent = `${currentCard + 1} / ${total}`;
  progressFill.style.width = `${((currentCard + 1) / total) * 100}%`;
  progressFill.style.background = s.accent;

  // 渲染三张卡（前、当前、后）
  const renderOne = (el, idx, cls) => {
    if (idx < 0 || idx >= total) {
      el.style.display = 'none';
      return;
    }
    el.style.display = 'flex';
    const c = cards[idx];
    el.className = `card ${cls}`;
    el.style.background = s.bg;
    el.innerHTML = `
      <div class="emoji">${c.emoji}</div>
      <div class="word">${c.word}</div>
      <div class="phonetic">${c.phonetic}</div>
      <div class="cn" style="color:${s.accent}">${c.cn}</div>
    `;
  };

  renderOne(cardPrev, currentCard - 1, 'prev');
  renderOne(cardCurrent, currentCard, 'current');
  renderOne(cardNext, currentCard + 1, 'next');

  btnPrev.disabled = currentCard === 0;
  btnNext.disabled = currentCard === total - 1;
}

function goPrev() {
  if (currentCard > 0) {
    currentCard--;
    renderCard();
  }
}

function goNext() {
  if (currentCard < series[currentSeries].cards.length - 1) {
    currentCard++;
    renderCard();
  }
}

function switchSeries(delta) {
  const next = currentSeries + delta;
  if (next >= 0 && next < series.length) {
    currentSeries = next;
    currentCard = 0;
    renderCard();
  }
}

// ============================================================
// 触摸滑动
// ============================================================
cardArea.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

cardArea.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    if (dx < 0) goNext();
    else goPrev();
  }
}, { passive: true });

// 键盘左右
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') goPrev();
  if (e.key === 'ArrowRight') goNext();
  if (e.key === 'Escape') goBack();
});

// 按钮
btnPrev.addEventListener('click', goPrev);
btnNext.addEventListener('click', goNext);
btnBack.addEventListener('click', goBack);
btnPrevSeries.addEventListener('click', () => switchSeries(-1));
btnNextSeries.addEventListener('click', () => switchSeries(1));

// ============================================================
// 初始化
// ============================================================
renderCatalog();
</script>
